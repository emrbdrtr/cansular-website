  <style>
    :root { --navy: #0d1f3c; --green: #4a9e6b; --border: #e8edf3; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f5f7fa; color: var(--navy); }

    /* ── NAV ── */
    nav {
      background: var(--navy);
      padding: 0 2rem;
      height: 68px;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,.18);
    }
    .nav-back {
      color: rgba(255,255,255,.7);
      text-decoration: none;
      font-size: .85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: .4rem;
      transition: color .2s;
      white-space: nowrap;
    }
    .nav-back:hover { color: #fff; }
    .nav-logo-wrap {
      background: #fff;
      padding: 5px 12px;
      border-radius: 8px;
      display: flex;
      align-items: center;
    }
    .nav-logo-wrap img { height: 36px; width: auto; display: block; }
    .nav-divider { width: 1px; height: 28px; background: rgba(255,255,255,.15); }

    /* ── MAIN ── */
    main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    /* ── BREADCRUMB ── */
    .breadcrumb {
      font-size: .8rem;
      color: #64748b;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .breadcrumb a { color: var(--green); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb span { color: #94a3b8; }

    /* ── PRODUCT DETAIL CARD ── */
    .prod-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 8px 40px rgba(0,0,0,.07);
      margin-bottom: 2rem;
    }

    /* image */
    .prod-img-wrap {
      border-radius: 14px;
      overflow: hidden;
      background: #f8f9fb;
      border: 1px solid var(--border);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .prod-img-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 1rem; }
    .prod-img-placeholder {
      aspect-ratio: 1;
      background: #f0f4f8;
      border-radius: 14px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .8rem;
      color: #94a3b8;
    }
    .prod-img-placeholder svg { width: 64px; height: 64px; opacity: .3; }
    .prod-img-placeholder span { font-size: .85rem; font-weight: 500; }

    /* info */
    .prod-info { display: flex; flex-direction: column; gap: 1.2rem; }
    .prod-badge {
      display: inline-block;
      background: rgba(74,158,107,.12);
      color: var(--green);
      font-size: .75rem;
      font-weight: 700;
      padding: .28rem .8rem;
      border-radius: 20px;
      width: fit-content;
      letter-spacing: .03em;
      text-transform: uppercase;
    }
    h1 { font-size: 1.65rem; font-weight: 800; line-height: 1.25; color: var(--navy); }
    .prod-desc { color: #4a5568; font-size: .95rem; line-height: 1.8; }

    .prod-tags { display: flex; gap: .45rem; flex-wrap: wrap; }
    .tag {
      background: #f0f4f8;
      color: #334155;
      font-size: .75rem;
      font-weight: 600;
      padding: .28rem .75rem;
      border-radius: 6px;
    }

    .divider { border: none; border-top: 1px solid var(--border); }

    .features h3 {
      font-size: .82rem;
      font-weight: 700;
      color: #64748b;
      margin-bottom: .75rem;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .features ul { list-style: none; display: flex; flex-direction: column; gap: .6rem; }
    .features li {
      display: flex;
      align-items: flex-start;
      gap: .65rem;
      font-size: .9rem;
      color: #334155;
      line-height: 1.5;
    }
    .feat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      margin-top: .38em;
      flex-shrink: 0;
    }

    .cta-row { display: flex; gap: .8rem; flex-wrap: wrap; margin-top: auto; padding-top: .4rem; }
    .btn-primary {
      background: var(--green);
      color: #fff;
      padding: .85rem 1.8rem;
      border-radius: 10px;
      font-weight: 700;
      font-size: .88rem;
      text-decoration: none;
      transition: background .2s;
      display: inline-flex;
      align-items: center;
      gap: .5rem;
    }
    .btn-primary:hover { background: #3a8a5a; }
    .btn-outline {
      border: 1.5px solid var(--border);
      color: var(--navy);
      padding: .85rem 1.8rem;
      border-radius: 10px;
      font-weight: 700;
      font-size: .88rem;
      text-decoration: none;
      transition: all .2s;
      display: inline-flex;
      align-items: center;
      gap: .5rem;
    }
    .btn-outline:hover { border-color: var(--green); color: var(--green); }

    /* ── INFO STRIP ── */
    .info-strip {
      background: #fff;
      border-radius: 16px;
      padding: 1.8rem 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,.05);
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .info-strip-icon {
      width: 48px; height: 48px;
      background: rgba(74,158,107,.1);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .info-strip-icon svg { width: 24px; height: 24px; color: var(--green); }
    .info-strip-text h4 { font-size: .9rem; font-weight: 700; color: var(--navy); margin-bottom: .2rem; }
    .info-strip-text p { font-size: .82rem; color: #64748b; }

    /* ── NOT FOUND ── */
    .not-found { text-align: center; padding: 5rem 2rem; }
    .not-found h2 { font-size: 1.4rem; color: var(--navy); margin-bottom: .8rem; }
    .not-found p { color: #64748b; margin-bottom: 1.8rem; }

    /* ── WA BUTTON ── */
    .wa-float {
      position: fixed; bottom: 24px; right: 24px;
      width: 56px; height: 56px;
      background: #25d366; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      z-index: 999; text-decoration: none;
      transition: transform .2s;
    }
    .wa-float:hover { transform: scale(1.1); }

    /* ── RESPONSIVE ── */
    @media (max-width: 720px) {
      .prod-detail { grid-template-columns: 1fr; gap: 1.5rem; padding: 1.5rem; }
      h1 { font-size: 1.35rem; }
      main { padding: 1.5rem 1rem 3rem; }
    }
    @media (max-width: 480px) {
      .cta-row { flex-direction: column; }
      .btn-primary, .btn-outline { justify-content: center; }
    }
  </style>
