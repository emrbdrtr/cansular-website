<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mesajınız Alındı | Cansular</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f5f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .card { background: #fff; border-radius: 16px; padding: 3rem 2.5rem; text-align: center; max-width: 480px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,.08); }
    .icon { font-size: 3.5rem; margin-bottom: 1.2rem; }
    h1 { font-size: 1.6rem; font-weight: 800; color: #0d1f3c; margin-bottom: .7rem; }
    p  { color: #64748b; font-size: .95rem; line-height: 1.7; margin-bottom: 1.8rem; }
    a  { display: inline-block; background: #4a9e6b; color: #fff; padding: .8rem 2rem; border-radius: 8px; font-weight: 700; font-size: .9rem; text-decoration: none; transition: background .2s; }
    a:hover { background: #3a8a5a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Mesajınız İletildi!</h1>
    <p>En kısa sürede size dönüş yapacağız. Acil talepler için <strong>(0212) 514 08 44</strong> numaralı hattımızı veya WhatsApp'ı kullanabilirsiniz.</p>
    <a href="/">Ana Sayfaya Dön</a>
  </div>
</body>
</html>
